cuda: 2
data:
      path: './dataset'
      name: 'MovieLens100K'
      LLM_info : 'LLM'
### Training Ablation
Train : True
wandb : False
LoadPretrain : 0
KGPretrain : 0
ContrastiveSeperate: 1
ContrastiveFused : 0
### Training Configuations
epoch : 1000
start_epoch : 0
seed : 2024
learning_rate : 0.0001
dataloader_n_workers : 8
embedding_dim : 64
# hidden_embedding_dim : 256
loss_reg_weight : 0.0001
### Model Setting(Subgraph Extraction)
extract_batch_size : 32
max_sample_neighbors : 3
### Model Setting(KG Training)
train_kge : False
kge_batch_size : 1024
kg_neg_size : 100
train_interval_kge : 1
entity_num_per_item : 15
kgcn : 'Ours'
kg_p_drop : 0.2
### Model Setting(BPR Training)
bpr_batch_size : 2048
lightGCN_n_layers : 2
dropout : True
keep_prob : 0.8
A_split : False
ui_p_drop : 0.001
#### Constrastive Learning
# LLM_info_path : '/data/cairui/KG-LLM-REC/saved_graphs/LLM_generated_info/'
# LLM_file: 'MovieLens1M_10_2_e0_enhanced_1600.pkl'
add_triple_ratio : 0.1
Recinfo_batch_size: 1000
confidence_threshold : 0.3
nce_temperatue : 0.2
mix_ratio : 0.5
loss_con_weight : 0.1
### Evaluation
eval_interval : 1
topks : [10]
test_u_batch_size : 128
early_stop_epoch : 900
metrics : ['precision', 'recall', 'ndcg']
metric_decimal_place : 6
### Saving
special_save_hyper : 'bi-inter'
load_path : ''
save_path : '/data/cairui/KG-LLM-REC/checkpoint/Model/'
save_interval : 1
