cuda: 7
data:
      path: './dataset'
      name: 'MovieLens1M'
### Training
Train: True
seed: 114
learning_rate : 0.0001
epoch : 100
start_epoch : 0
batch_size : 32
### Model Setting
isPretrain : 0
kg_neg_size : 100
max_sample_neighbors : 3
dataloader_n_workers : 8
embedding_dim : 64
ent_embedding_dim : 64
rel_embedding_dim : 64
hidden_embedding_dim : 256
loss_kge_weight : 0.5
loss_reg_weight : 0.0001
#### Aggregator
mess_dropout : [0.1, 0.1, 0.1]
conv_dim_list : [64, 32, 16]
aggregation_type : 'bi-interaction'
#### Constrastive Learning
start_step : 0
end_step : 0
con_temperature : 0.2
loss_con_weight : 0.01
### Evaluation
eval_interval : 1
topks : [10]
test_u_batch_size : 128
metrics : ['precision', 'recall', 'ndcg']
metric_decimal_place : 6
### Saving
special_save_hyper : 'bi-inter'
load_path : 'epoch_25_Model_MovieLens1M.ckpt'
save_path : '/data/cairui/KG-LLM-REC/'
save_interval : 1
