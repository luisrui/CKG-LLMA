cuda: 6
data:
      path: './dataset'
      name: 'MovieLens1M'
### Training Ablation
Train : True
LoadPretrain : 0
KGPretrain : 0
### Training Configuations
epoch : 1000
start_epoch : 0
seed : 114
learning_rate : 0.0001
batch_size : 32
dataloader_n_workers : 8
embedding_dim : 64
hidden_embedding_dim : 256
loss_reg_weight : 0.0001
### Model Setting(Subgraph Extraction)
max_sample_neighbors : 3
### Model Setting(KG Training)
train_kge : True
kge_batch_size : 1024
kg_neg_size : 100
train_interval_kge : 1
entity_num_per_item : 10
kgcn : 'RGAT'
kgc_temperatue : 0.2
kg_p_drop : 0.5
### Model Setting(BPR Training)
bpr_batch_size : 1024
lightGCN_n_layers : 2
dropout : True
keep_prob : 0.6
A_split : False
ui_p_drop : 0.01
#### Constrastive Learning
start_step : 0
end_step : 0
ssl_reg : 0.1
mix_ratio : 0.5
con_temperature : 0.2
loss_con_weight : 0.01
### Evaluation
eval_interval : 1
topks : [10]
test_u_batch_size : 128
early_stop_epoch : 100
metrics : ['precision', 'recall', 'ndcg']
metric_decimal_place : 6
### Saving
special_save_hyper : 'bi-inter'
load_path : ''
save_path : '/data/cairui/KG-LLM-REC/checkpoint/Model/'
save_interval : 1
