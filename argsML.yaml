load_path : '/data/cairui/KG-LLM-REC/checkpoint/epoch_25_Model_MovieLens1M.ckpt'
save_path : '/data/cairui/KG-LLM-REC/'
eval_interval : 1
save_interval : 5
topks : [10, 20, 50]
test_u_batch_size : 128



